name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies (Backend)
        run: |
          npm install

      - name: Run Backend (Test)
        run: |
          node index.js

      # If you have a frontend (React)
      - name: Install dependencies (Frontend)
        run: |
          cd client
          npm install

      - name: Build Frontend
        run: |
          cd client
          npm run build
